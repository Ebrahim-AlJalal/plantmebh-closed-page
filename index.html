<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlantMe Bahrain - Resting for the Season</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .font-playfair { font-family: 'Playfair Display', serif; }
        
        @keyframes roamHeaderLemon {
            0% { left: -5%; top: 45px; transform: rotate(0deg); opacity: 0; }
            10% { left: 15%; top: 5px; transform: rotate(90deg); opacity: 1; }
            20% { left: 22%; top: 40px; transform: rotate(180deg); opacity: 1; }
            28% { left: 28%; top: 15px; transform: rotate(240deg); opacity: 0; } 
            42% { left: 65%; top: 45px; transform: rotate(360deg); opacity: 0; } 
            50% { left: 72%; top: 10px; transform: rotate(450deg); opacity: 1; }
            60% { left: 78%; top: 40px; transform: rotate(540deg); opacity: 1; }
            68% { left: 85%; top: 15px; transform: rotate(600deg); opacity: 0; } 
            100% { left: 105%; top: 45px; transform: rotate(720deg); opacity: 0; }
        }
        .animate-roam { animation: roamHeaderLemon 14s linear infinite; }
        .floating-lemon {
            background-image: url('https://raw.githubusercontent.com/Ebrahim-AlJalal/plantmebh/main/wwwroot/images/lemon.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
    </style>
</head>
<body class="bg-[#FAFAFA] text-[#334155] min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
    
    <!-- Floating Background Lemon -->
    <div class="absolute inset-0 pointer-events-none z-0">
        <div class="absolute w-12 h-12 floating-lemon animate-roam"></div>
    </div>

    <!-- Main Content -->
    <div class="relative z-10 text-center max-w-xl mx-auto px-6 py-12 bg-white rounded-3xl shadow-xl border border-gray-100">
        <img src="https://raw.githubusercontent.com/Ebrahim-AlJalal/plantmebh/main/wwwroot/images/logo.png" alt="PlantMe Logo" class="h-24 mx-auto mb-8 object-contain" />
        
        <h1 class="text-4xl md:text-5xl font-playfair font-bold text-[#9BB8CD] mb-4">Resting for the Season</h1>
        <p class="text-lg text-[#5A6D7C] mb-8 font-medium">Thank you for a wonderful season! We are currently closed but will be back in June with fresh, exotic plants and beautiful new collections.</p>
        
        <a href="https://instagram.com/plantme_bh" target="_blank" class="inline-flex items-center gap-2 px-8 py-4 rounded-full bg-[#FDF0CB] text-[#5A6D7C] hover:bg-[#9BB8CD] hover:text-white transition-all shadow-md font-bold text-sm tracking-wide">
            Follow us on Instagram
        </a>
    </div>

</body>
</html>
